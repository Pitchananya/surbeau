<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>เข้าสู่ระบบ | surbeau</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-deep: #C96A7A; --navy: #1A1F3A; --gold: #C9A96E; --cream: #FBF8F4; --border: rgba(26,31,58,0.12);
    }
    body { font-family: 'Prompt', sans-serif; min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; background: var(--navy); margin: 0; }
    .left-panel { position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 3rem; color: #fff; background: radial-gradient(circle at 30% 20%, rgba(201,169,110,0.2), transparent); }
    .left-logo { position: absolute; top: 2.5rem; left: 3rem; font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: #fff; text-decoration: none; }
    .right-panel { background: var(--cream); display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .form-box { width: 100%; max-width: 380px; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; }
    .field input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 2px; box-sizing: border-box; }
    .btn-submit { width: 100%; padding: 0.9rem; background: var(--navy); color: #fff; border: none; cursor: pointer; text-transform: uppercase; }
    .btn-submit:hover { background: var(--rose-deep); }
    .alert-box { padding: 0.7rem; background: #ffebee; color: #c62828; margin-bottom: 1rem; display: none; font-size: 0.85rem; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="left-panel">
    <a href="/" class="left-logo">surbeau</a>
    <div style="z-index: 1;">
      <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem;">ยินดีต้อนรับ<br><em>กลับมา</em></h2>
      <p style="opacity: 0.6; font-size: 0.9rem;">เข้าสู่ระบบเพื่อจัดการเคสและค่าคอมมิชชันของคุณ</p>
    </div>
  </div>
  <div class="right-panel">
    <div class="form-box">
      <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--navy);">เข้าสู่ระบบ</h1>
      <p style="font-size: 0.85rem; color: #777; margin-bottom: 1.5rem;">ยังไม่มีบัญชี? <a href="/register-sale" style="color: var(--rose-deep);">สมัครสมาชิก</a></p>
      
      <div id="alert" class="alert-box"></div>

      <form id="login-form">
        <div class="field">
          <label>อีเมล</label>
          <input type="email" id="email" required placeholder="your@email.com">
        </div>
        <div class="field">
          <label>รหัสผ่าน</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      alertEl.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // ถ้าสำเร็จให้ไปหน้า Dashboard ของ Sale
          window.location.href = '/sale/dashboard';
        } else {
          alertEl.textContent = data.error || 'ข้อมูลไม่ถูกต้อง';
          alertEl.style.display = 'block';
        }
      } catch (err) {
        alertEl.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
        alertEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
