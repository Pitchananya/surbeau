<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>สร้างแคมเปญใหม่ | Clinic Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { background: #f3f4f6; font-family:"Prompt"; }
  .form-card {
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 2rem;
    border-radius: 1rem;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>

<div class="container py-4">
  <div class="form-card">

    <h3 class="mb-3">สร้างแคมเปญใหม่</h3>
    <div id="alert-box" class="alert d-none"></div>

    <form id="campaign-form">
      <div class="mb-3">
        <label class="form-label">ชื่อโปร</label>
        <input type="text" class="form-control" id="title" required>
      </div>

      <div class="mb-3">
        <label class="form-label">รายละเอียด</label>
        <textarea class="form-control" id="description"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">ราคาเต็ม</label>
        <input type="number" class="form-control" id="normal_price" required>
      </div>

      <div class="mb-3">
        <label class="form-label">ราคาโปร</label>
        <input type="number" class="form-control" id="promo_price" required>
      </div>

      <div class="mb-3">
        <label class="form-label">ค่าคอมต่อเคส (บาท)</label>
        <input type="number" class="form-control" id="commission" required>
      </div>

      <button class="btn btn-primary w-100">สร้างแคมเปญ</button>
    </form>

  </div>
</div>

<script>
  const form = document.getElementById("campaign-form");
  const alertBox = document.getElementById("alert-box");

  function show(msg, t="success") {
    alertBox.className = "alert alert-" + t;
    alertBox.textContent = msg;
    alertBox.classList.remove("d-none");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
      title: title.value,
      description: description.value,
      normal_price: Number(normal_price.value),
      promo_price: Number(promo_price.value),
      commission_per_success: Number(commission.value)
    };

    const res = await fetch("/clinic/add-campaign", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (res.status === 201) {
      show("สร้างแคมเปญสำเร็จ!");
      form.reset();
    } else {
      show(data.error || "เกิดข้อผิดพลาด", "danger");
    }
  });
</script>

</body>
</html>
